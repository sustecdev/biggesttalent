name: Deploy to Development
on:
  push:
    branches: [development]
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        chmod 600 ~/.ssh/known_hosts
    - name: Debug connection
      run: |
        ssh -o ConnectTimeout=10 ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo 'Connection successful'"
    - name: Deploy to Development Server
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      run: |
        set -e
        ssh -o StrictHostKeyChecking=no $SSH_USERNAME@$SSH_HOST "
          set -e
          cd /home/biggesttalentafrica/domains/dev.biggesttalent.africa/public_html
          
          # Set Git remote to use SSH instead of HTTPS
          git remote set-url origin git@github.com:sustecdev/shobbit.git
          
          git fetch origin
          git reset --hard origin/development
          
          if [ -f \"composer.json\" ]; then
            composer install --optimize-autoloader --no-interaction
          fi
          
          find . -type f -exec chmod 644 {} \;
          find . -type d -exec chmod 755 {} \;
          [ -d \"uploads\" ] && chmod -R 775 uploads/
          [ -d \"cache\" ] && chmod -R 775 cache/
          
          echo '🚀 Development deployment completed successfully!'
        "
    - name: Notify deployment status
      if: always()
      run: |
        if [ '${{ job.status }}' = 'success' ]; then
          echo '🚀 Deployment successful to https://dev.biggesttalent.africa'
        else
          echo '❌ Deployment failed - check logs above'
          exit 1
        fi